# fly.toml app configuration file generated for agentred on 2026-05-23T15:47:20Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agentred'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[checks]
  [checks.health]
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
