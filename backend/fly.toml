# Fly.io config for the AgentRed backend.
# Deploy from the REPO ROOT with:
#   fly deploy --config backend/fly.toml
# The Dockerfile lives at the repo root so the `backend` Python package
# imports work without juggling COPY paths.

app = "agentred-backend"      # <-- replace with the name you registered: `fly apps create <name>`
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"   # path is relative to the directory you run `fly deploy` from (the repo root)

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"   # SSE streams die if the machine sleeps mid-scan
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
